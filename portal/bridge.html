<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Something for you</title>
<!-- Cross the Bridge — no-install recipient page (migration 0031).
     Opened at ?bridge=<token>. Reads via the anon get_bridge RPC and
     responds via respond_bridge — no account, no signup, and nothing is
     ever collected from the recipient beyond what they type.
     DESIGN RULE: no commercial or subscription elements on this page. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E7; --card:#FFFDF8; --ink:#2B2621; --ink2:#6B6459; --ink3:#9A9184;
    --red:#B23A31; --olive:#5E6B47; --gold:#C8A24B; --divider:#E4DCCB;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:36px 22px 72px}
  .serif{font-family:"Playfair Display",Georgia,"Times New Roman",serif}
  .card{background:var(--card);border:1px solid var(--divider);border-radius:18px;
    padding:22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(43,38,33,.04)}
  .kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin:0 0 10px}
  h1{font-size:28px;margin:0 0 4px;font-weight:600}
  .toname{font-size:15px;color:var(--ink2);margin:0 0 26px}
  .why{font-style:italic;color:var(--ink2);font-size:15px;margin:0 0 14px}
  .message{font-size:16px;white-space:pre-wrap;margin:0}
  .signed{margin-top:16px;font-size:14px;color:var(--ink2);font-style:italic}
  .verse{font-size:20px;line-height:1.65;margin:0 0 12px}
  .verseref{font-size:12px;letter-spacing:.06em;color:var(--red);font-weight:600}
  .goldbar{border-left:3px solid var(--gold);padding-left:16px}
  .meaning{font-size:15px;color:var(--ink2);white-space:pre-wrap;margin:0}
  .invite{font-size:15px;margin:0}
  .ctx{margin-top:14px}
  .ctxlink{background:none;border:none;padding:0;margin:0;width:auto;color:var(--olive);
    font-size:13px;text-decoration:underline;cursor:pointer;font-weight:500}
  .ctxbody{display:none;margin-top:12px;max-height:340px;overflow-y:auto;
    border-top:1px solid var(--divider);padding-top:12px;font-size:14px;color:var(--ink2)}
  .ctxbody .v{margin:0 0 8px}
  .ctxbody .vn{font-size:10px;color:var(--ink3);vertical-align:super;margin-right:3px}
  .ctxbody .hl{background:#F3E9CF;border-radius:4px;padding:1px 3px;color:var(--ink)}
  .actions{margin-top:6px}
  .abtn{display:block;width:100%;padding:15px;font-size:15px;font-weight:600;text-align:center;
    border-radius:14px;border:1px solid var(--divider);background:var(--card);color:var(--ink);
    cursor:pointer;margin-bottom:10px;font-family:inherit}
  .abtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .abtn.quiet{background:none;border:none;color:var(--ink3);font-weight:500;font-size:13px;
    text-decoration:underline;padding:8px}
  .abtn:disabled{opacity:.5;cursor:default}
  textarea{width:100%;min-height:110px;padding:14px;font-size:15px;color:var(--ink);
    background:var(--card);border:1px solid var(--divider);border-radius:14px;outline:none;
    font-family:inherit;resize:vertical}
  textarea:focus{border-color:var(--gold)}
  .msg{font-size:13px;padding:12px 14px;border-radius:10px;margin-top:12px}
  .msg.err{background:#F7E4E1;color:var(--red)}
  .msg.ok{background:#E8EDE0;color:var(--olive)}
  .muted{color:var(--ink3);font-size:12px;line-height:1.5}
  .center{text-align:center}
  .foot{margin-top:36px;text-align:center;color:var(--ink3);font-size:12px}
  .daynav{display:flex;gap:10px;margin-top:16px}
  .daynav button{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:12px;
    border:1px solid var(--divider);background:var(--card);color:var(--ink);cursor:pointer;font-family:inherit}
  .daynav button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .daynav button:disabled{opacity:.4;cursor:default}
  .dots{display:flex;gap:6px;justify-content:center;margin:14px 0 0}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--divider)}
  .dot.on{background:var(--gold)}
  .hidden{display:none}
  .backlink{background:none;border:none;padding:0;color:var(--ink3);font-size:13px;
    text-decoration:underline;cursor:pointer;margin-bottom:14px;font-family:inherit}
  .crossmark{text-align:center;font-size:13px;letter-spacing:.08em;color:var(--ink3);margin-bottom:26px}
  .crossmark .x{color:var(--red)}
</style>
</head>
<body>
<div class="wrap"><div id="app"><p class="muted center">Opening…</p></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://wqumwxoiqsiwizlftojq.supabase.co";
const SUPABASE_KEY = "sb_publishable_W6kfGB2XfRAYvV_kfe_tWA_NiAdhZmL";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const app = document.getElementById("app");
const token = new URLSearchParams(location.search).get("bridge");
let bridge = null;
let journey = null;

const esc = (s)=> (s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---------------------------------------------------------------- init
(async function init(){
  if (!token) return renderNotFound();
  let res;
  try { res = (await sb.rpc("get_bridge", { p_token: token })).data; }
  catch(e){ res = null; }
  if (!res || !res.found) return renderNotFound();
  bridge = res;
  renderBridge();
})();

function renderNotFound(){
  app.innerHTML = `
    <div class="crossmark">CROSSED <span class="x">OUT</span></div>
    <div class="card center">
      <p class="serif verse" style="font-size:18px">This bridge isn't here anymore.</p>
      <p class="muted">The link may be incomplete — ask the person who sent it to share it again.</p>
    </div>`;
}

// ---------------------------------------------------------------- main render
function renderBridge(){
  const emphasis = bridge.response_option || "any";
  const order = actionOrder(emphasis);
  app.innerHTML = `
    <div class="crossmark">A BRIDGE, BUILT FOR YOU</div>
    <h1 class="serif">Hi, ${esc(bridge.to_name)}.</h1>
    <p class="toname">${esc(bridge.sender_name)} put this together for you. Take your time — nothing here expects anything from you.</p>

    <div class="card">
      <p class="kicker">Why I thought of you</p>
      <p class="why serif">“${esc(bridge.why_text)}”</p>
      <p class="message">${esc(bridge.message)}</p>
      <p class="signed">— ${esc(bridge.sender_name)}</p>
    </div>

    <div class="card">
      <p class="kicker">Something they wanted you to read</p>
      <div class="goldbar">
        <p class="verse serif">${esc(bridge.verse_text)}</p>
        <p class="verseref">${esc(bridge.verse_ref)} · Berean Standard Bible</p>
      </div>
      ${Array.isArray(bridge.context) && bridge.context.length ? `
      <div class="ctx">
        <button class="ctxlink" onclick="toggleContext()">See it in context</button>
        <div class="ctxbody" id="ctxbody">${contextHTML()}</div>
      </div>` : ``}
    </div>

    <div class="card">
      <p class="kicker">What it means to ${esc(bridge.sender_name)}</p>
      <p class="meaning">${esc(bridge.meaning)}</p>
    </div>

    ${bridge.invitation ? `
    <div class="card">
      <p class="kicker">An open invitation</p>
      <p class="invite">${esc(bridge.invitation)}</p>
      <p class="muted" style="margin-top:10px">Only if you want. It stays open.</p>
    </div>` : ``}

    <div class="actions" id="actions">
      <p class="kicker" style="margin-top:20px">If you'd like — and only if you'd like</p>
      ${order.map(actionButton).join("")}
      <button class="abtn quiet" onclick="showDecline()">No thanks — and that's okay</button>
    </div>

    <div id="panel"></div>
    <div class="foot">Sent with love through Crossed Out.<br>Nothing on this page signs you up for anything.</div>`;
}

function actionOrder(emphasis){
  const base = ["reply","prayer","journey","church"];
  if (emphasis === "any") return base;
  return [emphasis, ...base.filter(a => a !== emphasis)];
}

function actionButton(kind, idx){
  const primary = idx === 0 ? " primary" : "";
  const labels = {
    reply:   `Write back to ${esc(bridge.sender_name)} — privately`,
    prayer:  `Ask ${esc(bridge.sender_name)} to pray for something`,
    journey: `Walk “Seven Days of Hope” — 7 short readings`,
    church:  `Find a church near you`
  };
  const handlers = {
    reply: "showReply()", prayer: "showPrayer()",
    journey: "showJourney()", church: "showChurch()"
  };
  return `<button class="abtn${primary}" onclick="${handlers[kind]}">${labels[kind]}</button>`;
}

function contextHTML(){
  return bridge.context.map(v => {
    const inRange = v.verse >= bridge.verse_start &&
      v.verse <= (bridge.verse_end || bridge.verse_start);
    return `<p class="v"><span class="vn">${v.verse}</span>${inRange
      ? `<span class="hl">${esc(v.text)}</span>` : esc(v.text)}</p>`;
  }).join("");
}
function toggleContext(){
  const el = document.getElementById("ctxbody");
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

<script>
// ---------------------------------------------------------------- panels
function panel(){ return document.getElementById("panel"); }
function scrollToPanel(){ setTimeout(()=> panel().scrollIntoView({behavior:"smooth", block:"start"}), 50); }
function backBtn(){ return `<button class="backlink" onclick="closePanel()">‹ Back</button>`; }
function closePanel(){ panel().innerHTML = ""; document.getElementById("actions").classList.remove("hidden"); }
function openPanel(html){
  document.getElementById("actions").classList.add("hidden");
  panel().innerHTML = html;
  scrollToPanel();
}

async function respond(kind, message, day){
  try {
    const { error } = await sb.rpc("respond_bridge", {
      p_token: token, p_kind: kind, p_message: message ?? null, p_day: day ?? null
    });
    return !error;
  } catch(e){ return false; }
}

// ---------------------------------------------------------------- reply
function showReply(){
  openPanel(`
    <div class="card">
      ${backBtn()}
      <p class="kicker">A private note to ${esc(bridge.sender_name)}</p>
      <p class="muted" style="margin-bottom:12px">Only ${esc(bridge.sender_name)} sees this. Say as little or as much as you want.</p>
      <textarea id="replytext" placeholder="Whatever you'd like to say…"></textarea>
      <button class="abtn primary" style="margin-top:12px" onclick="sendReply(this)">Send it</button>
      <div id="replymsg"></div>
    </div>`);
}
async function sendReply(btn){
  const text = (document.getElementById("replytext").value || "").trim();
  const box = document.getElementById("replymsg");
  if (!text){ box.innerHTML = `<div class="msg err">Write a little something first.</div>`; return; }
  btn.disabled = true;
  const ok = await respond("reply", text, null);
  if (ok){
    panel().innerHTML = `<div class="card center">
      <p class="serif verse" style="font-size:19px">Sent.</p>
      <p class="muted">${esc(bridge.sender_name)} will see it next time they open the app.</p>
      <button class="abtn quiet" onclick="closePanel()">Back</button></div>`;
  } else {
    btn.disabled = false;
    box.innerHTML = `<div class="msg err">Couldn't send just now — try again in a moment.</div>`;
  }
}

// ---------------------------------------------------------------- prayer
function showPrayer(){
  openPanel(`
    <div class="card">
      ${backBtn()}
      <p class="kicker">Ask for prayer</p>
      <p class="muted" style="margin-bottom:12px">Tell ${esc(bridge.sender_name)} what you're carrying — or leave it blank and they'll simply pray for you.</p>
      <textarea id="prayertext" placeholder="(optional) What can they pray about?"></textarea>
      <button class="abtn primary" style="margin-top:12px" onclick="sendPrayer(this)">Ask them to pray</button>
      <div id="prayermsg"></div>
    </div>`);
}
async function sendPrayer(btn){
  const text = (document.getElementById("prayertext").value || "").trim();
  btn.disabled = true;
  const ok = await respond("prayer_request", text || null, null);
  if (ok){
    panel().innerHTML = `<div class="card center">
      <p class="serif verse" style="font-size:19px">They'll be praying for you.</p>
      <p class="muted">That's a promise ${esc(bridge.sender_name)} made when they built this.</p>
      <button class="abtn quiet" onclick="closePanel()">Back</button></div>`;
  } else {
    btn.disabled = false;
    document.getElementById("prayermsg").innerHTML =
      `<div class="msg err">Couldn't send just now — try again in a moment.</div>`;
  }
}

// ---------------------------------------------------------------- church
function showChurch(){
  openPanel(`
    <div class="card">
      ${backBtn()}
      <p class="kicker">In person, or from your couch</p>
      <p class="muted" style="margin-bottom:14px">Whatever feels doable. Sitting quietly in the back counts. So does watching in pajamas.</p>
      <a class="abtn" style="text-decoration:none" href="https://www.google.com/maps/search/churches+near+me" target="_blank" rel="noopener">Churches near me (opens Maps)</a>
      <a class="abtn" style="text-decoration:none" href="https://www.youtube.com/results?search_query=church+service+live+today" target="_blank" rel="noopener">Watch a service online</a>
      <p class="muted" style="margin-top:8px">Or just ask ${esc(bridge.sender_name)} — they'd genuinely love to bring you along.</p>
    </div>`);
}

// ---------------------------------------------------------------- decline
function showDecline(){
  openPanel(`
    <div class="card center">
      ${backBtn()}
      <p class="serif verse" style="font-size:19px">That's completely okay.</p>
      <p class="muted" style="margin-bottom:14px">No follow-ups, no guilt, nothing joined. Would you like to quietly let ${esc(bridge.sender_name)} know this isn't for you right now?</p>
      <button class="abtn" onclick="sendDecline(this)">Yes — let them know kindly</button>
      <button class="abtn quiet" onclick="closePanel()">Just close this</button>
      <div id="declinemsg"></div>
    </div>`);
}
async function sendDecline(btn){
  btn.disabled = true;
  const ok = await respond("decline", null, null);
  panel().innerHTML = `<div class="card center">
    <p class="serif verse" style="font-size:19px">Understood — kindly passed along.</p>
    <p class="muted">The door stays open, with no one standing in it. Be well, ${esc(bridge.to_name)}.</p></div>`;
  if (!ok) { /* even if the network failed, keep the gentle goodbye */ }
}
</script>

<script>
// ---------------------------------------------------------------- journey
// "Seven Days of Hope": readable day-by-day right here, before any signup.
// Progress lives in localStorage only; journey_started / journey_day are
// recorded (anonymously — just the token) so the sender can see the walk.
const JOURNEY_SLUG = "seven-days-of-hope";
const storeKey = "co_bridge_journey_" + token;

function journeyDayIndex(){
  const n = parseInt(localStorage.getItem(storeKey) || "1", 10);
  return isNaN(n) ? 1 : Math.min(Math.max(n, 1), 7);
}

async function showJourney(){
  if (!journey){
    openPanel(`<div class="card center"><p class="muted">Opening the journey…</p></div>`);
    let res;
    try { res = (await sb.rpc("get_journey", { p_slug: JOURNEY_SLUG })).data; }
    catch(e){ res = null; }
    if (!res || !res.found || !Array.isArray(res.days)){
      openPanel(`<div class="card center">${backBtn()}
        <p class="muted">The journey couldn't load just now — try again in a moment.</p></div>`);
      return;
    }
    journey = res;
    if (!localStorage.getItem(storeKey)){
      localStorage.setItem(storeKey, "1");
      respond("journey_started", null, null);
    }
  }
  renderJourneyDay(journeyDayIndex());
}

function renderJourneyDay(dayNum){
  const d = journey.days.find(x => x.day === dayNum) || journey.days[0];
  const last = dayNum >= journey.days.length;
  openPanel(`
    <div class="card">
      ${backBtn()}
      <p class="kicker">${esc(journey.title)} · Day ${d.day} of ${journey.days.length}</p>
      <h1 class="serif" style="font-size:22px;margin-bottom:14px">${esc(d.title)}</h1>
      <div class="goldbar" style="margin-bottom:14px">
        <p class="verse serif" style="font-size:17px">${esc(d.text || "")}</p>
        <p class="verseref">${esc(d.ref)} · Berean Standard Bible</p>
      </div>
      <p class="message" style="font-size:15px;color:var(--ink2)">${esc(d.body)}</p>
      <div class="dots">${journey.days.map(x =>
        `<div class="dot${x.day <= dayNum ? " on" : ""}"></div>`).join("")}</div>
      <div class="daynav">
        <button onclick="prevDay(${d.day})" ${d.day <= 1 ? "disabled" : ""}>Previous</button>
        <button class="primary" onclick="nextDay(${d.day})">${last ? "Finish" : "Done for today"}</button>
      </div>
      <p class="muted center" style="margin-top:12px">One a day is plenty — this page remembers where you left off.</p>
    </div>`);
}

function prevDay(current){
  renderJourneyDay(Math.max(1, current - 1));
}

function nextDay(current){
  respond("journey_day", null, current);
  if (current >= journey.days.length){
    localStorage.setItem(storeKey, String(journey.days.length));
    openPanel(`<div class="card center">
      <p class="serif verse" style="font-size:20px">Seven days, walked.</p>
      <p class="muted" style="margin-bottom:14px">However you're feeling about all of this — curious, unsure, warmer than you expected — ${esc(bridge.sender_name)} would love to hear it. And the last invitation stands: come and see.</p>
      <button class="abtn primary" onclick="showReply()">Tell ${esc(bridge.sender_name)} how it went</button>
      <button class="abtn quiet" onclick="closePanel()">Back</button>
    </div>`);
    return;
  }
  const next = current + 1;
  localStorage.setItem(storeKey, String(next));
  renderJourneyDay(next);
}
</script>
</body>
</html>
