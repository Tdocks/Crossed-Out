name: CrossedOut
options:
  bundleIdPrefix: com.tdocks
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
targets:
  CrossedOut:
    type: application
    platform: iOS
    sources:
      - CrossedOut
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tdocks.crossedout
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: Q9ZH8AA9NY
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: CrossedOut/CrossedOut.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: CrossedOut/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - PlayfairDisplay-Regular.ttf
          - PlayfairDisplay-Italic.ttf
          - Inter.ttf
          - Inter-Italic.ttf
        ITSAppUsesNonExemptEncryption: false
        CFBundleDisplayName: Crossed Out
